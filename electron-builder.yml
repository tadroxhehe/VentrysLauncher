appId: 'ventryslauncher'
productName: 'Ventrys Launcher'
artifactName: 'Ventrys-Launcher-setup-${version}.${ext}'

copyright: 'Copyright © 2018-2026 Daniel Scalzi'

asar: true
compression: 'maximum'

files:
  - '!{dist,.gitignore,.vscode,docs,dev-app-update.yml,.nvmrc,eslint.config.mjs,null}'

extraResources:
  - 'libraries'

# Windows Configuration
win:
  icon: build/icon.ico
  target: 
    - target: 'nsis'
      arch: 'x64'

# Windows Installer Configuration
nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true

# macOS Configuration
mac:
  icon: build/icon.png
  identity: null
  target:
    - target: 'dmg'
      arch:
        - 'x64'
        - 'arm64'
  artifactName: '${productName}-setup-${version}-${arch}.${ext}'
  category: 'public.app-category.games'

# Linux Configuration
linux:
  icon: build/icon.png
  target: 'deb'
  maintainer: 'Daniel Scalzi'
  vendor: 'Daniel Scalzi'
  synopsis: 'Modded Minecraft Launcher'
  description: 'Custom launcher which allows users to join modded servers. All mods, configurations, and updates are handled automatically.'
  category: 'Game'


directories:
  buildResources: 'build'
  output: 'dist'

publish:
  provider: github
  owner: tadroxhehe
  repo: VentrysLauncher